<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Ausflüge</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0f172a;
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 30px 15px;
}

header h1 {
  margin: 0;
  font-size: 28px;
}

/* Layout */
.container {
  max-width: 900px;
  margin: auto;
  padding: 10px;
  display: grid;
  gap: 15px;
}

/* Card */
.card {
  background: #111827;
  border-radius: 16px;
  padding: 18px;
  border: 2px solid transparent;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

/* Status Farben */
.free {
  border-color: #22c55e;
}

.full {
  border-color: #ef4444;
}

.private {
  border-color: #9ca3af;
  opacity: 0.7;
}

/* Titel */
.title {
  font-size: 18px;
  margin-bottom: 5px;
}

/* Badge */
.badge {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 13px;
  margin-top: 8px;
}

.green { background: #052e16; color: #22c55e; }
.red { background: #450a0a; color: #ef4444; }
.gray { background: #1f2937; color: #9ca3af; }

/* Details */
details {
  margin-top: 10px;
  cursor: pointer;
}

summary {
  color: #cbd5e1;
}

p {
  color: #cbd5e1;
}
</style>
</head>

<body>

<header>
  <h1>📅 Meine Ausflüge</h1>
  <p>Einfach ansehen, ob Plätze frei sind</p>
</header>

<div class="container" id="app"></div>

<script>
const events = [
  {
    title: "🌲 Wanderung Schwarzwald",
    date: "12.04.2026",
    max: 5,
    participants: 2,
    private: false,
    details: "Treffpunkt: Bahnhof • Dauer: 4h"
  },
  {
    title: "🎬 Kinoabend",
    date: "20.04.2026",
    max: 3,
    participants: 3,
    private: false,
    details: "Film + Snacks 🍿"
  },
  {
    title: "🔥 Grillabend",
    date: "25.04.2026",
    max: 10,
    participants: 0,
    private: true,
    details: "Nur für Freunde"
  }
];

const app = document.getElementById("app");

events.forEach(e => {

  const card = document.createElement("div");
  card.classList.add("card");

  let statusText = "";
  let badgeClass = "";
  let stateClass = "";

  if (e.private) {
    statusText = "🔒 Privat";
    badgeClass = "gray";
    stateClass = "private";
  }
  else if (e.participants >= e.max) {
    statusText = "🚫 Ausgebucht";
    badgeClass = "red";
    stateClass = "full";
  }
  else {
    statusText = `🟢 ${e.participants}/${e.max} frei`;
    badgeClass = "green";
    stateClass = "free";
  }

  card.classList.add(stateClass);

  card.innerHTML = `
    <div class="title">${e.title}</div>
    <div>📅 ${e.date}</div>

    <span class="badge ${badgeClass}">
      ${statusText}
    </span>

    <details>
      <summary>Details anzeigen</summary>
      <p>${e.details}</p>
    </details>
  `;

  app.appendChild(card);
});
</script>

</body>
</html>
