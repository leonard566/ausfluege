<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Ausflüge</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b1220;
  color: white;
}

/* 🌟 HEADER (modern sticky feel) */
header {
  text-align: center;
  padding: 25px 15px;
  position: sticky;
  top: 0;
  background: rgba(11,18,32,0.8);
  backdrop-filter: blur(10px);
  z-index: 10;
}

header h1 {
  margin: 0;
  font-size: 28px;
}

header p {
  color: #94a3b8;
}

/* 📱 MOBILE-FIRST CONTAINER */
.container {
  max-width: 700px;
  margin: auto;
  padding: 15px;
  display: grid;
  gap: 16px;
}

/* 🧩 CARD (modern app look) */
.card {
  background: #111827;
  border-radius: 18px;
  padding: 20px;
  border: 2px solid transparent;
  transition: 0.25s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
  position: relative;
}

.card:hover {
  transform: translateY(-4px);
}

/* ⭐ FEATURED EVENT */
.featured {
  border: 2px solid #fbbf24;
  background: linear-gradient(135deg, #111827, #1f2937);
  box-shadow: 0 0 20px rgba(251,191,36,0.25);
}

.featured::before {
  content: "🔥 HIGHLIGHT";
  position: absolute;
  top: 10px;
  right: 12px;
  background: #fbbf24;
  color: black;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 999px;
  font-weight: bold;
}

/* TITEL */
.title {
  font-size: 18px;
  margin-bottom: 6px;
}

/* DETAILS */
details {
  margin-top: 12px;
}

summary {
  color: #cbd5e1;
  cursor: pointer;
}

p {
  color: #cbd5e1;
}

/* BADGES */
.badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 13px;
  margin-top: 10px;
}

.green { background: #052e16; color: #22c55e; }
.red { background: #450a0a; color: #ff4d4d; }
.gray { background: #1f2937; color: #9ca3af; }
.purple { background: #2e1065; color: #c084fc; }

/* STATUS BORDERS */
.free { border-color: #22c55e; }
.full { border-color: #ef4444; }
.private { border-color: #9ca3af; opacity: 0.75; }
.cancelled {
  border-color: #ff2d2d;
  background: rgba(255,0,0,0.08);
  opacity: 0.6;
  filter: grayscale(1);
}
.postponed { border-color: #a855f7; }

.cancelled .title {
  text-decoration: line-through;
  text-decoration-color: #ff2d2d;
  text-decoration-thickness: 2px;
}
</style>
</head>

<body>

<header>
  <h1>📅 Meine Ausflüge</h1>
  <p>Modernes Event-Board</p>
</header>

<div class="container" id="app"></div>

<script>

const events = [
  {
    title: "🎬 Murgtalbahn Fotos",
    date: "28.03.2026",
    status: "free",
    featured: true,
    details: "Fotos & Videos im Murgtal. Start 9–10 Uhr."
  },
  {
    title: "🚶 Teckbahn Tour",
    date: "29.03.2026",
    status: "private",
    featured: false,
    details: "Nur für bestimmte Personen"
  },
  {
    title: "🏙️ Stuttgart Trip",
    date: "05.04.2026",
    status: "cancelled",
    featured: false,
    details: "Fällt wegen Wetter aus"
  },
  {
    title: "🚆 Schwarzwald",
    date: "12.04.2026",
    status: "postponed",
    featured: false,
    details: "Wird verschoben"
  }
];

const app = document.getElementById("app");

events.forEach(e => {

  const card = document.createElement("div");

  // FEATURED + STATUS CLASSES
  let classes = ["card", e.status];
  if (e.featured) classes.push("featured");

  card.className = classes.join(" ");

  let badgeText = "";
  let badgeClass = "";

  if (e.status === "free") {
    badgeText = "🟢 Teilnahme möglich";
    badgeClass = "green";
  }
  if (e.status === "full") {
    badgeText = "🔴 Ausgebucht";
    badgeClass = "red";
  }
  if (e.status === "private") {
    badgeText = "🔒 Privat";
    badgeClass = "gray";
  }
  if (e.status === "cancelled") {
    badgeText = "❌ Fällt aus";
    badgeClass = "red";
  }
  if (e.status === "postponed") {
    badgeText = "🟣 Verschoben";
    badgeClass = "purple";
  }

  card.innerHTML = `
    <div class="title">${e.title}</div>
    <div>📅 ${e.date}</div>

    <span class="badge ${badgeClass}">
      ${badgeText}
    </span>

    <details>
      <summary>Details anzeigen</summary>
      <p>${e.details}</p>
    </details>
  `;

  app.appendChild(card);
});

</script>

</body>
</html>
