<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Ausflüge</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  max-width: 700px;
  margin: auto;
}

h1 {
  text-align: center;
}

.event {
  background: white;
  border: 3px solid green;
  border-radius: 12px;
  padding: 15px;
  margin: 20px 0;
  transition: 0.3s;
}

.event.full {
  border-color: red;
  opacity: 0.7;
}

.event.private {
  border-color: gray;
  opacity: 0.6;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

button.join {
  background: green;
  color: white;
}

button.disabled {
  background: gray;
  cursor: not-allowed;
}

.status {
  font-weight: bold;
}

</style>
</head>

<body>

<h1>📅 Meine Ausflüge</h1>

<div id="events"></div>

<script>

// 🔧 HIER DEINE EVENTS DEFINIEREN
const events = [
  {
    title: "Wanderung Schwarzwald",
    date: "12. April 2026",
    max: 5,
    participants: 2,
    private: false,
    details: "Treffpunkt Bahnhof, Dauer 4h"
  },
  {
    title: "Kinoabend",
    date: "20. April 2026",
    max: 3,
    participants: 3,
    private: false,
    details: "Film: Actionfilm 🍿"
  },
  {
    title: "Grillabend",
    date: "25. April 2026",
    max: 10,
    participants: 0,
    private: true,
    details: "Nur für Freunde"
  }
];

// 🎨 Anzeige
const container = document.getElementById("events");

events.forEach(event => {

  const div = document.createElement("div");
  div.classList.add("event");

  // 🔒 Privat
  if (event.private) {
    div.classList.add("private");
  }

  // 🚫 Voll
  if (event.participants >= event.max) {
    div.classList.add("full");
  }

  // Status Text
  let statusText = "";

  if (event.private) {
    statusText = "🔒 Privat";
  } else if (event.participants >= event.max) {
    statusText = "🚫 Ausgebucht";
  } else {
    statusText = `👥 ${event.participants} / ${event.max} Plätze frei`;
  }

  div.innerHTML = `
    <h2>${event.title}</h2>
    <p>📅 ${event.date}</p>
    <p class="status">${statusText}</p>

    <details>
      <summary>Details anzeigen</summary>
      <p>${event.details}</p>
    </details>
  `;

  // Button nur wenn möglich
  if (!event.private && event.participants < event.max) {
    const btn = document.createElement("button");
    btn.classList.add("join");
    btn.innerText = "Ich komme mit";

    btn.onclick = () => {
      const name = prompt("Dein Name:");
      if (name) {
        alert("Danke " + name + "! (Nur Demo – wird nicht gespeichert)");
      }
    };

    div.appendChild(btn);
  } else {
    const btn = document.createElement("button");
    btn.classList.add("disabled");
    btn.innerText = "Nicht verfügbar";
    div.appendChild(btn);
  }

  container.appendChild(div);
});

</script>

</body>
</html>
