<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Ausflüge</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b1220;
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 30px 15px;
}

header h1 {
  margin: 0;
  font-size: 30px;
}

header p {
  color: #94a3b8;
}

/* Grid */
.container {
  max-width: 900px;
  margin: auto;
  padding: 10px;
  display: grid;
  gap: 15px;
}

/* Card */
.card {
  background: #111827;
  border-radius: 16px;
  padding: 18px;
  border: 2px solid transparent;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-4px);
}

/* Status Farben */
.free {
  border-color: #22c55e;
}

.full {
  border-color: #ef4444;
}

.private {
  border-color: #9ca3af;
  opacity: 0.7;
}

/* Titel */
.title {
  font-size: 18px;
  margin-bottom: 5px;
}

/* Badge */
.badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 13px;
  margin-top: 10px;
}

.green { background: #052e16; color: #22c55e; }
.red { background: #450a0a; color: #ef4444; }
.gray { background: #1f2937; color: #9ca3af; }

/* Details */
details {
  margin-top: 12px;
  cursor: pointer;
}

summary {
  color: #cbd5e1;
}

p {
  color: #cbd5e1;
}
</style>
</head>

<body>

<header>
  <h1>📅 Meine Ausflüge</h1>
  <p>Einfach ansehen, ob du mit kannst</p>
</header>

<div class="container" id="app"></div>

<script>

const events = [
  {
    title: "🎬📸 Murgtalbahn Fotos/Videos",
    date: "28.03.2026",
    status: "free",
    details: "Wir laufen durch das Murgtal und fotografieren bzw. filmen die Züge. Begleitet wird die Murgtalreise von guter Musik.\nStart gegen 9 oder 10 Uhr am Hbf."
  },
  {
    title: "🚶‍♂️ Teckbahn/Weil der Stadt",
    date: "29.03.2026",
    status: "private",
    details: "Nur für bestimmte Personen"
  },
  {
    title: "🏙️ Stuttgart",
    date: "05.04.2026",
    status: "private",
    details: "Nur für bestimmte Personen"
  }
];

const app = document.getElementById("app");

events.forEach(e => {

  const card = document.createElement("div");
  card.classList.add("card", e.status);

  let badgeText = "";
  let badgeClass = "";

  if (e.status === "free") {
    badgeText = "🟢 Teilnahme möglich";
    badgeClass = "green";
  }

  if (e.status === "full") {
    badgeText = "🔴 Ausgebucht";
    badgeClass = "red";
  }

  if (e.status === "private") {
    badgeText = "🔒 Privat";
    badgeClass = "gray";
  }

  card.innerHTML = `
    <div class="title">${e.title}</div>
    <div>📅 ${e.date}</div>

    <span class="badge ${badgeClass}">
      ${badgeText}
    </span>

    <details>
      <summary>Details anzeigen</summary>
      <p>${e.details}</p>
    </details>
  `;

  app.appendChild(card);
});

</script>

</body>
</html>
