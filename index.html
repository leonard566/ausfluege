<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Ausflüge</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b1220;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 25px 15px;
  position: sticky;
  top: 0;
  background: rgba(11,18,32,0.85);
  backdrop-filter: blur(10px);
  z-index: 10;
}

header h1 {
  margin: 0;
  font-size: 28px;
}

header p {
  color: #94a3b8;
}

/* CONTAINER */
.container {
  max-width: 700px;
  margin: auto;
  padding: 15px;
  display: grid;
  gap: 16px;
}

/* CARD */
.card {
  background: #111827;
  border-radius: 18px;
  padding: 20px;
  border: 2px solid transparent;
  transition: 0.25s;
  position: relative;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.card:hover {
  transform: translateY(-4px);
}

/* TITEL */
.title {
  font-size: 18px;
  margin-bottom: 6px;
}

/* DETAILS */
details {
  margin-top: 12px;
}

summary {
  color: #cbd5e1;
  cursor: pointer;
}

p {
  color: #cbd5e1;
}

/* BADGES */
.badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 13px;
  margin-top: 10px;
}

/* COLORS */
.green { background: #052e16; color: #22c55e; }
.red { background: #450a0a; color: #ff4d4d; }
.gray { background: #1f2937; color: #9ca3af; }
.purple { background: #2e1065; color: #c084fc; }

/* STATUS */
.free { border-color: #22c55e; }
.full { border-color: #ef4444; }
.private { border-color: #9ca3af; opacity: 0.75; }
.postponed { border-color: #a855f7; }

/* ❌ CANCELLED CARD (MEHR FARBE) */
.cancelled {
  border-color: #ff2d2d;
  background: linear-gradient(135deg, rgba(255,0,0,0.12), rgba(255,0,0,0.04));
  opacity: 0.75;
  box-shadow: 0 0 18px rgba(255,0,0,0.25);
  position: relative;
}

/* 🔴 ROTER DURCHSTRICH */
.cancelled .title {
  text-decoration: line-through;
  text-decoration-color: #ff2d2d;
  text-decoration-thickness: 2px;
}

/* 🔴 ABGESAGT BADGE (SANFT BLINKEND) */
.cancelled-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: linear-gradient(135deg, #ff2d2d, #b30000);
  color: white;
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 999px;
  font-weight: bold;

  animation: softBlink 2.8s infinite;
}

/* SANFTES BLINKEN */
@keyframes softBlink {
  0%   { opacity: 1; transform: scale(1); }
  50%  { opacity: 0.45; transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<header>
  <h1>📅 Meine Ausflüge</h1>
  <p>Modernes Event-Board</p>
</header>

<div class="container" id="app"></div>

<script>

const events = [
  {
    title: "🎬 Murgtalbahn Fotos",
    date: "28.03.2026",
    status: "free",
    details: "Fotos & Videos im Murgtal"
  },
  {
    title: "🏙️ Stuttgart Trip",
    date: "05.04.2026",
    status: "cancelled",
    details: "Fällt wegen Wetter aus"
  },
  {
    title: "🚆 Schwarzwald Tour",
    date: "12.04.2026",
    status: "postponed",
    details: "Wird verschoben"
  }
];

const app = document.getElementById("app");

events.forEach(e => {

  const card = document.createElement("div");
  card.classList.add("card", e.status);

  let badgeText = "";
  let badgeClass = "";

  if (e.status === "free") {
    badgeText = "🟢 Teilnahme möglich";
    badgeClass = "green";
  }

  if (e.status === "cancelled") {
    badgeText = "❌ Fällt aus";
    badgeClass = "red";
  }

  if (e.status === "postponed") {
    badgeText = "🟣 Verschoben";
    badgeClass = "purple";
  }

  card.innerHTML = `
    <div class="title">${e.title}</div>
    <div>📅 ${e.date}</div>

    ${e.status === "cancelled" ? `<div class="cancelled-badge">ABGESAGT</div>` : ""}

    <span class="badge ${badgeClass}">
      ${badgeText}
    </span>

    <details>
      <summary>Details anzeigen</summary>
      <p>${e.details}</p>
    </details>
  `;

  app.appendChild(card);
});

</script>

</body>
</html>
