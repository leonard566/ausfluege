<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Ausflüge</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b1220;
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 30px 15px;
}

header h1 {
  margin: 0;
  font-size: 30px;
}

header p {
  color: #94a3b8;
}

/* Container */
.container {
  max-width: 900px;
  margin: auto;
  padding: 10px;
  display: grid;
  gap: 15px;
}

/* Card */
.card {
  background: #111827;
  border-radius: 16px;
  padding: 18px;
  border: 2px solid transparent;
  transition: 0.2s;
  position: relative;
}

.card:hover {
  transform: translateY(-4px);
}

/* TITEL */
.title {
  font-size: 18px;
  margin-bottom: 5px;
}

/* DETAILS */
details {
  margin-top: 12px;
  cursor: pointer;
}

summary {
  color: #cbd5e1;
}

p {
  color: #cbd5e1;
}

/* BADGE */
.badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 13px;
  margin-top: 10px;
}

/* STATUS FARBEN */
.green { background: #052e16; color: #22c55e; }
.red { background: #450a0a; color: #ff4d4d; }
.gray { background: #1f2937; color: #9ca3af; }
.purple { background: #2e1065; color: #c084fc; }
.yellow { background: #422006; color: #fbbf24; }

/* 🟢 FREE */
.free {
  border-color: #22c55e;
}

/* 🔴 FULL */
.full {
  border-color: #ef4444;
}

/* 🔒 PRIVATE */
.private {
  border-color: #9ca3af;
  opacity: 0.75;
}

/* ❌ CANCELLED (FÄLLT AUS) */
.cancelled {
  border-color: #ff2d2d;
  background: rgba(255, 0, 0, 0.08);
  opacity: 0.6;
  filter: grayscale(1);
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.25);
}

/* durchgestrichener Titel bei abgesagt */
.cancelled .title {
  text-decoration: line-through;
  text-decoration-thickness: 2px;
  text-decoration-color: #ff2d2d;
}

/* 🟣 POSTPONED */
.postponed {
  border-color: #a855f7;
}

/* Label für abgesagt */
.cancelled::before {
  content: "❌ ABGESAGT";
  position: absolute;
  top: 10px;
  right: 12px;
  background: #ff2d2d;
  color: white;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 999px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h1>📅 Meine Ausflüge</h1>
  <p>Pro Event Übersicht</p>
</header>

<div class="container" id="app"></div>

<script>

const events = [
  {
    title: "🎬📸 Murgtalbahn Fotos/Videos",
    date: "28.03.2026",
    status: "free",
    details: "Wir laufen durch das Murgtal und fotografieren die Züge.\nStart ca. 9–10 Uhr am Hbf."
  },
  {
    title: "🚶‍♂️ Teckbahn Tour",
    date: "29.03.2026",
    status: "private",
    details: "Nur für bestimmte Personen"
  },
  {
    title: "🏙️ Stuttgart Trip",
    date: "05.04.2026",
    status: "cancelled",
    details: "Fällt wegen Wetter leider aus"
  },
  {
    title: "🚆 Schwarzwald Tour",
    date: "12.04.2026",
    status: "postponed",
    details: "Wird verschoben auf unbestimmtes Datum"
  },
  {
    title: "🎉 Sommer Event",
    date: "20.06.2026",
    status: "full",
    details: "Leider schon voll"
  }
];

const app = document.getElementById("app");

events.forEach(e => {

  const card = document.createElement("div");
  card.classList.add("card", e.status);

  let badgeText = "";
  let badgeClass = "";

  if (e.status === "free") {
    badgeText = "🟢 Teilnahme möglich";
    badgeClass = "green";
  }

  if (e.status === "full") {
    badgeText = "🔴 Ausgebucht";
    badgeClass = "red";
  }

  if (e.status === "private") {
    badgeText = "🔒 Privat";
    badgeClass = "gray";
  }

  if (e.status === "cancelled") {
    badgeText = "❌ Fällt aus";
    badgeClass = "red";
  }

  if (e.status === "postponed") {
    badgeText = "🟣 Verschoben";
    badgeClass = "purple";
  }

  card.innerHTML = `
    <div class="title">${e.title}</div>
    <div>📅 ${e.date}</div>

    <span class="badge ${badgeClass}">
      ${badgeText}
    </span>

    <details>
      <summary>Details anzeigen</summary>
      <p>${e.details}</p>
    </details>
  `;

  app.appendChild(card);
});

</script>

</body>
</html>
