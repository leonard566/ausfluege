<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meine Ausflüge</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #eef2f7, #dce3ea);
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  color: #333;
}

/* Container */
#events {
  display: grid;
  gap: 20px;
  max-width: 800px;
  margin: auto;
}

/* Event Card */
.event {
  background: white;
  border-radius: 16px;
  padding: 20px;
  border: 3px solid #4caf50;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: transform 0.2s, box-shadow 0.2s;
}

.event:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.12);
}

/* Zustände */
.event.full {
  border-color: #e53935;
}

.event.private {
  border-color: #9e9e9e;
  opacity: 0.7;
}

/* Titel */
.event h2 {
  margin: 0 0 10px;
}

/* Status Badge */
.status {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  margin-top: 5px;
}

.free {
  background: #e8f5e9;
  color: #2e7d32;
}

.fullBadge {
  background: #ffebee;
  color: #c62828;
}

.privateBadge {
  background: #eeeeee;
  color: #555;
}

/* Details */
details {
  margin-top: 10px;
  cursor: pointer;
}

summary {
  font-weight: bold;
  color: #555;
}

</style>
</head>

<body>

<h1>📅 Meine Ausflüge</h1>

<div id="events"></div>

<script>

// 🔧 EVENTS HIER ANPASSEN
const events = [
  {
    title: "🌲 Wanderung Schwarzwald",
    date: "12. April 2026",
    max: 5,
    participants: 2,
    private: false,
    details: "Treffpunkt Bahnhof, Dauer ca. 4h"
  },
  {
    title: "🎬 Kinoabend",
    date: "20. April 2026",
    max: 3,
    participants: 3,
    private: false,
    details: "Film + Snacks 🍿"
  },
  {
    title: "🔥 Grillabend",
    date: "25. April 2026",
    max: 10,
    participants: 0,
    private: true,
    details: "Nur für Freunde"
  }
];

const container = document.getElementById("events");

events.forEach(event => {

  const div = document.createElement("div");
  div.classList.add("event");

  let statusClass = "free";
  let statusText = "";
  let borderClass = "";

  // Logik
  if (event.private) {
    statusText = "🔒 Privat";
    statusClass = "privateBadge";
    borderClass = "private";
  } 
  else if (event.participants >= event.max) {
    statusText = "🚫 Ausgebucht";
    statusClass = "fullBadge";
    borderClass = "full";
  } 
  else {
    statusText = `🟢 ${event.participants} / ${event.max} Plätze frei`;
  }

  div.classList.add(borderClass);

  div.innerHTML = `
    <h2>${event.title}</h2>
    <p>📅 ${event.date}</p>
    <span class="status ${statusClass}">${statusText}</span>

    <details>
      <summary>Details anzeigen</summary>
      <p>${event.details}</p>
    </details>
  `;

  container.appendChild(div);
});

</script>

</body>
</html>
