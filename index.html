<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Ausflüge</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b1220;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 25px 15px;
  position: sticky;
  top: 0;
  background: rgba(11,18,32,0.85);
  backdrop-filter: blur(10px);
}

header h1 {
  margin: 0;
  font-size: 28px;
}

header p {
  color: #94a3b8;
}

/* CONTAINER */
.container {
  max-width: 700px;
  margin: auto;
  padding: 15px;
  display: grid;
  gap: 16px;
}

/* CARD */
.card {
  background: #111827;
  border-radius: 18px;
  padding: 20px;
  border: 2px solid transparent;
  transition: 0.25s;
  position: relative;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.card:hover {
  transform: translateY(-4px);
}

/* TITEL */
.title {
  font-size: 18px;
  margin-bottom: 6px;
}

/* DETAILS */
details {
  margin-top: 12px;
}

summary {
  color: #cbd5e1;
  cursor: pointer;
}

p {
  color: #cbd5e1;
}

/* BADGES CONTAINER */
.badges {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* BADGE */
.badge {
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 13px;
}

/* COLORS */
.green { background: #052e16; color: #22c55e; }
.red { background: #450a0a; color: #ff4d4d; }
.gray { background: #1f2937; color: #9ca3af; }
.purple { background: #2e1065; color: #c084fc; }
.yellow { background: #3f2f00; color: #facc15; }

/* STATUS BORDER */
.free { border-color: #22c55e; }
.full { border-color: #ef4444; }
.private { border-color: #9ca3af; opacity: 0.8; }
.postponed { border-color: #a855f7; }

/* ❌ CANCELLED */
.cancelled {
  border-color: #ff2d2d;
  background: linear-gradient(135deg, rgba(255,0,0,0.12), rgba(255,0,0,0.04));
  box-shadow: 0 0 18px rgba(255,0,0,0.25);
}

/* 🔴 Durchstrich */
.cancelled .title {
  text-decoration: line-through;
  text-decoration-color: #ff2d2d;
  text-decoration-thickness: 2px;
}

/* 🔴 Badge */
.cancelled-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: linear-gradient(135deg, #ff2d2d, #b30000);
  color: white;
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 999px;
  font-weight: bold;
  animation: softBlink 2.8s infinite;
}

@keyframes softBlink {
  50% { opacity: 0.4; }
}
</style>
</head>

<body>

<header>
  <h1>📅 Meine Ausflüge</h1>
  <p>Modernes Event-Board</p>
</header>

<div class="container" id="app"></div>

<script>

const events = [
  {
    title: "🎬📸 Murgtalbahn Fotos/Videos",
    date: <s>"28.03.2026"</s>"??.??.2026,
    status: ["postponed"],
    details: "Wir laufen durch das Murgtal und fotografieren die Züge."<s>"Start ca. 9–10 Uhr am Hbf."</s>
  },
  {
    title: "🚶‍♂️ Teckbahn Tour",
    date: "29.03.2026",
    status: ["private"],
    details: "Nur für bestimmte Personen"
  },
  {
    title: "🚈 Bahntag Karlsruhe",
    date: "03.04.2026",
    status: ["full"],
    details: "Wir fahren Bahn - RegioTram - Tram"
  },
  {
    title: "🏙️ Stuttgart",
    date: "05.04.2026",
    status: ["planned", "private"], // ✅ GEPLANT + PRIVAT
    details: "Nur für bestimmte Personen"
  }
];

const app = document.getElementById("app");

events.forEach(e => {

  const card = document.createElement("div");
  card.classList.add("card");

  let badgesHTML = "";

  e.status.forEach(s => {

    if (s === "planned") {
      badgesHTML += `<span class="badge yellow">🟡 Geplant</span>`;
    }

    if (s === "free") {
      badgesHTML += `<span class="badge green">🟢 Teilnahme möglich</span>`;
      card.classList.add("free");
    }

    if (s === "full") {
      badgesHTML += `<span class="badge red">🔴 Keine Teilnahme (mehr) möglich</span>`;
      card.classList.add("full");
    }

    if (s === "private") {
      badgesHTML += `<span class="badge gray">🔒 Privat</span>`;
      card.classList.add("private");
    }

    if (s === "postponed") {
      badgesHTML += `<span class="badge purple">🟣 Verschoben</span>`;
      card.classList.add("postponed");
    }

    if (s === "cancelled") {
      badgesHTML += `<span class="badge red">❌ Fällt aus</span>`;
      card.classList.add("cancelled");
    }

  });

  card.innerHTML = `
    <div class="title">${e.title}</div>
    <div>📅 ${e.date}</div>

    ${e.status.includes("cancelled") ? `<div class="cancelled-badge">ABGESAGT</div>` : ""}

    <div class="badges">
      ${badgesHTML}
    </div>

    <details>
      <summary>Details anzeigen</summary>
      <p>${e.details}</p>
    </details>
  `;

  app.appendChild(card);
});

</script>

</body>
</html>
